<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Prospects — Calls</title>
<link rel="apple-touch-icon" sizes="180x180" href="app-icon-180.png" />
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#0b5cad" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black" />
<meta name="apple-mobile-web-app-title" content="Prospects" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js"></script>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0f141c;--panel:#171e29;--ink:#e6ecf5;--muted:#9aa6b6;--line:#2a3340;--brand:#3b82f6;--ok:#10b981;--hot:#e0457b;--warn:#d4a017}
html,body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,sans-serif;-webkit-font-smoothing:antialiased}
body{padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
header{position:sticky;top:0;z-index:10;background:var(--bg);padding:14px 16px 6px}
header h1{margin:0;font-size:20px;font-weight:750;letter-spacing:.2px}
header .sub{font-size:12px;color:var(--muted);margin-top:2px}
.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:6px 16px 10px}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:10px 11px}
.kpi .v{font-size:21px;font-weight:780;line-height:1}
.kpi .l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-top:5px}
.kpi.hot .v{color:var(--hot)} .kpi.warn .v{color:var(--warn)} .kpi.ok .v{color:var(--ok)}
.tabs{display:flex;gap:6px;padding:2px 16px 10px;position:sticky;top:54px;background:var(--bg);z-index:9}
.tab{flex:1;text-align:center;padding:9px 4px;border:1px solid var(--line);border-radius:11px;background:var(--panel);color:var(--muted);font-weight:650;font-size:13.5px}
.tab.on{background:var(--brand);color:#fff;border-color:var(--brand)}
.search{padding:0 16px 8px}
.search input{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:12px;background:var(--panel);color:var(--ink);font-size:15px}
.list{padding:0 12px 32px}
.row{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:11px 12px;margin:0 4px 9px}
.row .info{flex:1;min-width:0}
.row .nm{font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row .co{font-size:12.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.cat{display:inline-block;font-size:10.5px;font-weight:650;padding:1px 8px;border-radius:20px;background:#1c2531;border:1px solid var(--line);color:var(--muted)}
.syncbtn{background:var(--panel);border:1px solid var(--line);color:var(--ink);border-radius:11px;padding:9px 13px;font-size:13.5px;font-weight:650;flex-shrink:0}
.comp{display:flex;align-items:center;gap:7px;margin-top:7px}
.comp .bar{flex:1;height:5px;border-radius:4px;background:#222c39;overflow:hidden}
.comp .bar i{display:block;height:100%;background:var(--brand)}
.comp .st{font-size:10.5px;color:var(--muted);white-space:nowrap}
.reason{display:inline-block;font-size:10.5px;font-weight:650;padding:2px 8px;border-radius:20px;background:#1f2937;color:var(--muted);margin-bottom:6px}
.reason.due{background:rgba(212,160,23,.18);color:var(--warn)}
.reason.hot{background:rgba(224,69,123,.18);color:var(--hot)}
.reason.new{background:rgba(59,130,246,.18);color:#7eb0ff}
.acts{display:flex;gap:8px;flex-shrink:0}
.btn{width:42px;height:42px;border-radius:12px;border:1px solid var(--line);background:#1c2531;display:flex;align-items:center;justify-content:center;font-size:18px;text-decoration:none;color:var(--ink)}
.btn.call{background:var(--ok);border-color:var(--ok);color:#04130d}
.btn.li{color:#7eb0ff;font-style:italic;font-weight:700}
.btn.off{opacity:.32;pointer-events:none}
.empty{text-align:center;color:var(--muted);padding:46px 24px;font-size:14px;line-height:1.5}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--ok);margin-left:6px;vertical-align:middle}
/* stats */
.statsec{padding:2px 16px 4px;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin-top:8px}
.note{padding:0 16px 8px;font-size:12px;color:var(--muted)}
.cov{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:2px 16px 6px}
.sect{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:11px}
.sect .sn{font-size:12.5px;font-weight:650;display:flex;justify-content:space-between;gap:6px}
.sect .sn b{color:var(--muted);font-weight:600;font-size:11px}
.sect .sv{font-size:20px;font-weight:760;margin-top:3px}
.sect .chips{display:flex;gap:5px;margin-top:6px}
.sect .chip{font-size:10px;background:#1c2531;border:1px solid var(--line);border-radius:8px;padding:1px 6px;color:var(--muted)}
.sect .bar{height:5px;border-radius:4px;background:#222c39;overflow:hidden;margin-top:8px}
.sect .bar i{display:block;height:100%;background:var(--ok)}
.chartbox{background:var(--panel);border:1px solid var(--line);border-radius:14px;margin:6px 16px 12px;padding:12px}
.chartbox h3{margin:0 0 8px;font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.chartbox .cv{position:relative;height:230px}
</style>
</head>
<body>
<header>
  <div style="display:flex;align-items:center;gap:10px">
    <div style="flex:1;min-width:0"><h1>Prospects</h1><div class="sub" id="hsub"></div></div>
    <button id="exportBtn" class="syncbtn">⤴ Export</button>
    <button id="syncBtn" class="syncbtn">⟲ Sync</button>
  </div>
</header>
<input type="file" id="syncFile" accept=".json,application/json" style="display:none" />
<div class="kpis" id="kpis"></div>
<div class="tabs">
  <div class="tab on" data-v="today">Today</div>
  <div class="tab" data-v="pipe">Pipeline</div>
  <div class="tab" data-v="stats">Stats</div>
</div>
<div class="search" id="searchWrap" style="display:none"><input id="search" placeholder="Search name or company…" /></div>
<div class="list" id="list"></div>

<script>
var KEY="nbi_prospects_v4";
var data=[];
function load(){try{data=JSON.parse(localStorage.getItem(KEY)||"[]");if(!Array.isArray(data))data=[];}catch(e){data=[];}}
function save(){try{localStorage.setItem(KEY,JSON.stringify(data));}catch(e){}}
var STAGES=["To Research","Researching","Contact Found","Contacted","Response Received","Meeting","Proposal","Signed","Archived"];
var FUNNEL=["To Research","Researching","Contact Found","Contacted","Response Received","Meeting","Proposal","Signed"];
var PCT={"To Research":5,"Researching":15,"Contact Found":30,"Contacted":45,"Response Received":60,"Meeting":75,"Proposal":88,"Signed":100,"Archived":0};
var INDUSTRIES=["Banking & Finance","Insurance","Asset Mgmt & SACCOs","Agriculture & Agribusiness","Manufacturing & Industrial","FMCG & Consumer Goods","Retail & Distribution","Real Estate & Construction","Telecom, Tech & Fintech","Energy & Petroleum","Transport & Logistics","Tourism & Hospitality","Healthcare & Pharma","Media & Entertainment","Education","Professional Services","NGOs & Nonprofits"];
var SEGMENTS=["HNW Individual","Corporate / SME","Institution","Business Owner / Brand","CEO/Management Play"];
var SEGCOL=["#1d4ed8","#0a8f6a","#6d28d9","#b45309","#db2777"];
function stageIdx(k){return STAGES.indexOf(k);}
function today(){return new Date().toISOString().slice(0,10);}
function byId(id){return data.find(function(p){return p.id===id;});}
function esc(s){return (''+(s==null?'':s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function phoneFound(p){return !!(((''+(p.phone||'')).trim()&&p.phoneManual)||((p.extraPhones||[]).some(function(e){return e&&(''+e).trim();})));}
function directLine(p){var d=(''+(p.phone||'')).trim();if(d)return d;var ex=(p.extraPhones||[]).filter(function(e){return e&&(''+e).trim();});return ex.length?(''+ex[0]).trim():'';}
function hasEmail(p){return !!(((''+(p.email||'')).trim())||((p.extraEmails||[]).some(function(e){return e&&(''+e).trim();})));}
function hasContact(p){return !!(hasEmail(p)||phoneFound(p));}
function hotLead(p){if(p.archived||p.stage==="Archived"||p.stage==="Signed")return false;return !!(p.responded||stageIdx(p.stage)>=stageIdx("Response Received"));}
function score(p){return (+p.fit||0)+(+p.acc||0)+(+p.trg||0)+(+p.w||0);}
function activeList(){return data.filter(function(p){return !p.archived&&p.stage!=="Archived";});}
function who(p){return (p.contactName&&(''+p.contactName).trim())?(''+p.contactName).trim():(p.company||p.name||'—');}
function company(p){return p.company||p.name||'';}
function liHref(p){var l=(''+(p.link||'')).trim();if(/linkedin\.com/i.test(l))return l;return "https://www.linkedin.com/search/results/all/?keywords="+encodeURIComponent(who(p)+' '+(company(p)||''));}
function segLabel(p){var s=p.segment||'';if(/HNW/i.test(s))return 'HNWI';if(/Institution/i.test(s))return 'Institution';if(/Corporate/i.test(s))return 'Corporate / SME';if(/Business Owner|Brand/i.test(s))return 'Business Owner';if(/CEO|Management/i.test(s))return 'CEO / Mgmt';return s||'Individual';}
function subLine(p){var co=(company(p)||'').trim(),nm=(who(p)||'').trim();if(co&&co.toLowerCase()!==nm.toLowerCase())return esc(co);return '<span class="cat">'+esc(segLabel(p))+'</span>';}
function logCall(id){var p=byId(id);if(!p)return;var iso=today();if(!p.contactLog)p.contactLog=[];p.contactLog.push({d:iso,t:"Call"});p.lastContacted=iso;if(p.stage==="To Research"||p.stage==="Researching"||p.stage==="Contact Found")p.stage="Contacted";save();setTimeout(render,400);}

function kpis(){
 var act=activeList(),t=today();
 var nw=act.filter(function(p){return p.stage==="Contact Found"&&hasContact(p);}).length;
 var fd=act.filter(function(p){return p.followUp&&p.followUp<=t;}).length;
 var hot=data.filter(hotLead).length;
 var contacted=act.filter(function(p){return (p.contactLog&&p.contactLog.length)||stageIdx(p.stage)>=stageIdx("Contacted");}).length;
 var now=Date.now(),calls=0;
 data.forEach(function(p){(p.contactLog||[]).forEach(function(e){if(e&&e.d&&/call/i.test(e.t||'')){var tt=new Date(e.d).getTime();if(!isNaN(tt)&&now-tt<=7*864e5)calls++;}});});
 var cards=[["Prospects",act.length,""],["New",nw,"new"],["Follow-ups",fd,"warn"],["Hot leads",hot,"hot"],["Calls / wk",calls,"ok"],["Contacted",contacted,"ok"]];
 document.getElementById("kpis").innerHTML=cards.map(function(c){return '<div class="kpi '+(c[2]||'')+'"><div class="v">'+c[1]+'</div><div class="l">'+c[0]+'</div></div>';}).join('');
 document.getElementById("hsub").textContent=act.length?(act.length+" active · "+fd+" due today"):"";
}

function topList(){
 var t=today(),cand=[];
 data.forEach(function(p){
  if(p.archived||p.stage==="Archived"||p.done||p.stage==="Signed"||p.outcome==="Not Interested")return;
  var ws=0,reason='',cls='';
  if(p.followUp&&p.followUp<t){ws=400;reason='Overdue follow-up';cls='due';}
  else if(p.followUp&&p.followUp===t){ws=360;reason='Follow-up today';cls='due';}
  else if(hotLead(p)){ws=300;reason='Hot lead — responded';cls='hot';}
  else if(p.stage==="Contact Found"&&hasContact(p)){ws=200;reason='New contact — reach out';cls='new';}
  else return;
  cand.push({p:p,ws:ws+score(p),reason:reason,cls:cls});
 });
 cand.sort(function(a,b){return b.ws-a.ws;});
 return cand.slice(0,15);
}

function rowHtml(p,reason,cls){
 var num=directLine(p),canCall=!!num,pct=PCT[p.stage]||0;
 var rb=reason?'<span class="reason '+(cls||'')+'">'+esc(reason)+'</span><br>':'';
 return '<div class="row"><div class="info">'+rb
   +'<div class="nm">'+esc(who(p))+(hasContact(p)?'<span class="dot"></span>':'')+'</div>'
   +'<div class="co">'+subLine(p)+'</div>'
   +'<div class="comp"><div class="bar"><i style="width:'+pct+'%"></i></div><span class="st">'+esc(p.stage||'')+'</span></div>'
  +'</div><div class="acts">'
   +'<a class="btn li" href="'+liHref(p)+'" target="_blank" rel="noopener">in</a>'
   +'<a class="btn call'+(canCall?'':' off')+'"'+(canCall?' href="tel:'+esc(num.replace(/[^0-9+]/g,''))+'" onclick="logCall(\''+p.id+'\')"':'')+'>☎</a>'
  +'</div></div>';
}

function statsHtml(){
 var act=activeList();
 var counts={},em={},ph={},dc={};INDUSTRIES.forEach(function(i){counts[i]=0;em[i]=0;ph[i]=0;dc[i]=0;});
 act.forEach(function(p){if(counts[p.industry]!=null){counts[p.industry]++;if(hasEmail(p))em[p.industry]++;if(phoneFound(p))ph[p.industry]++;}});
 data.forEach(function(p){if(p.done&&counts[p.industry]!=null)dc[p.industry]++;});
 var covered=INDUSTRIES.filter(function(i){return counts[i]>0;}).length;
 var worked=INDUSTRIES.filter(function(i){return counts[i]>0&&dc[i]>=counts[i];}).length;
 var contacts=act.filter(hasContact).length;
 var emN=act.filter(hasEmail).length, phN=act.filter(phoneFound).length;
 var head='<div class="kpis" style="padding-top:0"><div class="kpi"><div class="v">'+covered+' / '+INDUSTRIES.length+'</div><div class="l">Industries covered</div></div>'
   +'<div class="kpi"><div class="v">'+contacts+'</div><div class="l">Direct contacts</div></div>'
   +'<div class="kpi"><div class="v" style="font-size:14px;padding-top:5px">✉ '+emN+'  ☎ '+phN+'</div><div class="l">Reachable</div></div></div>';
 var cov='<div class="statsec">Industry coverage map</div><div class="note">'+worked+' of '+INDUSTRIES.length+' sectors fully worked 🎯</div><div class="cov">'+INDUSTRIES.map(function(i){
   var n=counts[i],pct=n?Math.round(dc[i]/n*100):0;
   return '<div class="sect"><div class="sn"><span>'+esc(i)+'</span><b>'+dc[i]+'/'+n+'</b></div><div class="sv">'+n+'</div><div class="chips"><span class="chip">✉ '+em[i]+'</span><span class="chip">☎ '+ph[i]+'</span></div><div class="bar"><i style="width:'+pct+'%"></i></div></div>';
 }).join('')+'</div>';
 var charts='<div class="chartbox"><h3>Research funnel</h3><div class="cv"><canvas id="cFunnel"></canvas></div></div>'
   +'<div class="chartbox"><h3>Prospects by segment</h3><div class="cv"><canvas id="cSeg"></canvas></div></div>';
 return head+cov+charts;
}

var chF=null,chS=null;
function drawCharts(){
 if(typeof Chart==="undefined")return;
 var act=activeList();
 var fc=FUNNEL.map(function(s){return act.filter(function(p){return p.stage===s;}).length;});
 var elF=document.getElementById("cFunnel");
 if(elF){if(chF)chF.destroy();chF=new Chart(elF,{type:"bar",data:{labels:FUNNEL,datasets:[{data:fc,backgroundColor:"#2f6bff",borderRadius:5}]},options:{plugins:{legend:{display:false}},scales:{x:{ticks:{color:"#9aa6b6",font:{size:9},maxRotation:60,minRotation:60},grid:{display:false}},y:{ticks:{color:"#9aa6b6"},grid:{color:"#222c39"}}},maintainAspectRatio:false}});}
 var sc=SEGMENTS.map(function(s){return data.filter(function(p){return p.segment===s;}).length;});
 var elS=document.getElementById("cSeg");
 if(elS){if(chS)chS.destroy();chS=new Chart(elS,{type:"doughnut",data:{labels:SEGMENTS,datasets:[{data:sc,backgroundColor:SEGCOL,borderWidth:0}]},options:{plugins:{legend:{position:"bottom",labels:{color:"#9aa6b6",boxWidth:12,font:{size:11}}}},cutout:"58%",maintainAspectRatio:false}});}
}

var view="today";
function render(){try{_render();}catch(err){var el=document.getElementById("list");if(el)el.innerHTML='<div class="empty">Couldn\'t render: '+((err&&err.message)?(''+err.message):(''+err))+'</div>';}}
function _render(){
 load();kpis();
 var el=document.getElementById("list"),sw=document.getElementById("searchWrap");
 if(view==="today"){
  sw.style.display="none";
  var top=topList();
  el.innerHTML=top.length?top.map(function(x){return rowHtml(x.p,x.reason,x.cls);}).join(''):'<div class="empty">'+(data.length?'Nothing pressing today. Use Pipeline to call anyone.':'No prospects on this device yet — tap ⟲ Sync (top right) to load a .json backup.')+'</div>';
 }else if(view==="pipe"){
  sw.style.display="block";
  var q=(document.getElementById("search").value||'').trim().toLowerCase();
  var rows=activeList().filter(function(p){if(!q)return true;return ((who(p)+' '+company(p)).toLowerCase().indexOf(q)>=0);});
  rows.sort(function(a,b){var d=(PCT[b.stage]||0)-(PCT[a.stage]||0);return d||who(a).localeCompare(who(b));});
  el.innerHTML=rows.length?rows.map(function(p){return rowHtml(p,'','');}).join(''):'<div class="empty">'+(data.length?'No matches.':'No prospects on this device yet. Open the full web app on this phone and use Sync to load your data.')+'</div>';
 }else{
  sw.style.display="none";
  if(!data.length){el.innerHTML='<div class="empty">No data on this device yet. Open the full web app on this phone and use Sync.</div>';return;}
  el.innerHTML=statsHtml();
  requestAnimationFrame(drawCharts);
 }
}

function mergeIn(arr){
 load();
 var byIdMap={},byNm={};
 data.forEach(function(p){if(p.id)byIdMap[p.id]=p;byNm[((p.contactName||p.name||'')+'|'+(p.company||p.name||'')).toLowerCase()]=p;});
 var added=0,updated=0;
 arr.forEach(function(inc){
  if(!inc||typeof inc!=="object")return;
  var ex=(inc.id&&byIdMap[inc.id])||byNm[((inc.contactName||inc.name||'')+'|'+(inc.company||inc.name||'')).toLowerCase()];
  if(ex){
   var logs=(ex.contactLog||[]).concat(inc.contactLog||[]);
   var seen={},merged=[];logs.forEach(function(l){var k=((l&&l.d)||'')+'|'+((l&&l.t)||'');if(l&&!seen[k]){seen[k]=1;merged.push(l);}});
   var st=(stageIdx(inc.stage)>=stageIdx(ex.stage))?inc.stage:ex.stage;
   Object.assign(ex,inc);ex.contactLog=merged;ex.stage=st;updated++;
  }else{data.push(inc);added++;}
 });
 save();return {added:added,updated:updated};
}
function exportData(){
 load();
 if(!data.length){alert("No data to export yet — Sync some in first.");return;}
 var fn="prospects-phone-"+today()+".json";
 var txt=JSON.stringify(data);
 try{
  var file=new File([txt],fn,{type:"application/json"});
  if(navigator.canShare&&navigator.canShare({files:[file]})){
   navigator.share({files:[file],title:"Prospect data"}).catch(function(){});
   return;
  }
 }catch(e){}
 var a=document.createElement("a");a.href=URL.createObjectURL(new Blob([txt],{type:"application/json"}));a.download=fn;document.body.appendChild(a);a.click();a.remove();
 alert("Saved "+fn+". Choose 'Save to Files' → your OneDrive folder, then Sync it on the computer.");
}
document.getElementById("exportBtn").onclick=exportData;
document.getElementById("syncBtn").onclick=function(){document.getElementById("syncFile").click();};
document.getElementById("syncFile").onchange=function(e){var f=e.target.files[0];if(!f)return;var rd=new FileReader();rd.onload=function(){var arr;try{arr=JSON.parse(rd.result);}catch(err){alert("That isn't a valid backup .json file.");return;}if(!Array.isArray(arr)){alert("That file isn't a prospect backup (expected a .json list).");return;}var r=mergeIn(arr);render();alert("Synced ✓  "+r.updated+" updated, "+r.added+" added. Nothing was removed.");};rd.readAsText(f);e.target.value="";};
document.querySelectorAll('.tab').forEach(function(t){t.onclick=function(){view=t.dataset.v;document.querySelectorAll('.tab').forEach(function(x){x.classList.toggle('on',x===t);});render();};});
document.getElementById("search").addEventListener("input",render);
window.addEventListener("storage",function(e){if(e.key===KEY)render();});
window.addEventListener("pageshow",render);
window.addEventListener("focus",render);
render();
</script>
</body>
</html>
